<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模块系统 - iframe 测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: #fafaf8;
}
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 64px;
  background: rgba(250,250,248,.92);
  backdrop-filter: blur(20px);
  z-index: 1000;
  border-bottom: 1px solid rgba(0,0,0,.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
}
.nav-logo {
  font-weight: 500;
  font-size: 20px;
  letter-spacing: 3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-logo .dot {
  width: 8px;
  height: 8px;
  background: #7A9E7E;
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
}
.nav-links {
  display: flex;
  gap: 32px;
}
.nav-links a {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: .5px;
  position: relative;
  padding: 4px 0;
  color: #333;
  text-decoration: none;
}
.nav-links a.active {
  color: #000;
}
.nav-links a.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 1px;
  background: #000;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.nav-icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  color: #333;
}
.user-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #f5f5f3;
  border: 1px solid #e5e5e5;
  display: flex;
  align-items: center;
  justify-content: center;
}
.iframe-container {
  margin-top: 64px;
  width: 100%;
  height: calc(100vh - 64px);
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<!-- 复用当前网站的导航栏 -->
<nav class="nav">
  <div class="nav-logo">
    <div class="dot"></div>
    MGILT
  </div>
  <div class="nav-links">
    <a href="#">首页</a>
    <a href="#" class="active">模块系统</a>
    <a href="#">空间灵感</a>
    <a href="#">设计你的MGILT</a>
    <a href="#">关于MGILT</a>
    <a href="#">合作伙伴</a>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>
    </button>
    <div class="user-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
    </div>
  </div>
</nav>

<!-- iframe 嵌入 React 模块系统页面 -->
<div class="iframe-container">
  <iframe src="http://localhost:3005/" id="modulesIframe"></iframe>
</div>

<script>
// 隐藏 iframe 中的导航栏
window.addEventListener('load', function() {
  const iframe = document.getElementById('modulesIframe');
  try {
    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
    const header = iframeDoc.querySelector('header');
    if (header) {
      header.style.display = 'none';
    }
    const main = iframeDoc.querySelector('main');
    if (main) {
      main.style.paddingTop = '0';
    }
  } catch (e) {
    console.log('跨域限制，无法修改 iframe 内容样式');
  }
});
</script>

</body>
</html>
